# Quietly — localization codegen config (flutter gen-l10n).
# ARB sources live in lib/l10n; AppLocalizations is generated alongside them
# (synthetic-package is deprecated on recent Flutter, so we output into lib/).
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-localization-file: app_localizations.dart
output-class: AppLocalizations
output-dir: lib/l10n
nullable-getter: false
